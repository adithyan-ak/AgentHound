openapi: 3.0.3
info:
  title: AgentHound API
  description: >-
    REST API for `agenthound-server`. The server binds to 127.0.0.1:8080
    by default and is single-user. Mutating endpoints are gated by an
    Origin allowlist (OriginGuard): browser requests must originate from
    an allowlisted origin (default `http://localhost:8080` and
    `http://127.0.0.1:8080`, configurable via `AGENTHOUND_CORS_ORIGINS`).
    Requests with no `Origin` header are admitted as non-browser callers
    (curl, the agenthound CLI, cron pipelines).


    Read-only endpoints (graph reads, findings, prebuilt queries,
    rules, health, docs) are intentionally open. Single-user posture
    means localhost reads are fine; gating them would force the UI to
    plumb auth headers through every read for no security gain.


    The `/ingest` endpoint accepts JSON from the collector. Stream
    directly from the host (`agenthound scan --output - | curl
    --data-binary @- http://127.0.0.1:8080/api/v1/ingest`) or drag-drop
    a scan file into the UI's Scan Manager. CLI ingest
    (`agenthound-server ingest <file>`) bypasses HTTP entirely.
  version: "0.1.0"
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
servers:
  - url: /api/v1
    description: Default

components:
  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          $ref: "#/components/schemas/ErrorDetail"

    ErrorDetail:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          example: VALIDATION_ERROR
        message:
          type: string
          example: description of the problem
        details:
          description: Additional error context (validation errors, etc.)

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [ok, degraded]
        neo4j:
          type: string
          enum: [ok, unavailable]
        postgres:
          type: string
          enum: [ok, unavailable]

    GraphStats:
      type: object
      properties:
        node_counts:
          type: object
          additionalProperties:
            type: integer
        edge_counts:
          type: object
          additionalProperties:
            type: integer
        total_nodes:
          type: integer
        total_edges:
          type: integer

    Node:
      type: object
      properties:
        id:
          type: string
        kinds:
          type: array
          items:
            type: string
        properties:
          type: object
          additionalProperties: true

    Edge:
      type: object
      properties:
        source:
          type: string
        target:
          type: string
        kind:
          type: string
        source_kind:
          type: string
        target_kind:
          type: string
        properties:
          type: object
          additionalProperties: true

    NodeDetail:
      type: object
      properties:
        node:
          $ref: "#/components/schemas/Node"
        edges:
          type: array
          items:
            $ref: "#/components/schemas/Edge"

    SearchResultItem:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        kind:
          type: string

    NeighborhoodResponse:
      type: object
      properties:
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/Node"
        edges:
          type: array
          items:
            $ref: "#/components/schemas/Edge"

    BlastRadiusResponse:
      type: object
      properties:
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/Node"
        edges:
          type: array
          items:
            $ref: "#/components/schemas/Edge"
        rings:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
        direction:
          type: string
          enum: [out, in, both]
        max_hops:
          type: integer

    PathRequest:
      type: object
      required: [source, source_kind]
      properties:
        source:
          type: string
        target:
          type: string
        source_kind:
          type: string
        target_kind:
          type: string
        scope:
          type: string
          enum: [topology, security]
          default: security
          description: >-
            security follows the explicit directed security relationship
            policy; topology explicitly requests legacy undirected traversal.
        max_hops:
          type: integer
          default: 10
          minimum: 1
          maximum: 20
        limit:
          type: integer
          default: 10
          minimum: 1
          maximum: 100

    PathNode:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        kinds:
          type: array
          items:
            type: string
        properties:
          type: object
          additionalProperties: true

    PathEdge:
      type: object
      properties:
        kind:
          type: string
        source:
          type: string
        target:
          type: string
        risk_weight:
          type: number

    PathResult:
      type: object
      properties:
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/PathNode"
        edges:
          type: array
          items:
            $ref: "#/components/schemas/PathEdge"
        hops:
          type: integer
        weight:
          type: number

    PathResponse:
      type: object
      properties:
        paths:
          type: array
          items:
            $ref: "#/components/schemas/PathResult"
        algorithm:
          type: string
        metadata:
          $ref: "#/components/schemas/TraversalMetadata"

    TraversalMetadata:
      type: object
      required:
        [scope, direction, relationship_kinds, max_hops, algorithm, complete]
      properties:
        scope:
          type: string
          enum: [topology, security]
        direction:
          type: string
          enum: [out, both]
        relationship_kinds:
          type: array
          items:
            type: string
        max_hops:
          type: integer
        algorithm:
          type: string
          enum: [bounded-min-weight, bounded-enumeration]
        complete:
          type: boolean
        truncated:
          type: boolean
        expansion_limit:
          type: integer
        expansions:
          type: integer
        default_risk_weight:
          type: number
        used_default_weights:
          type: boolean
        incomplete_reason:
          type: string

    Finding:
      type: object
      properties:
        id:
          type: string
        scan_id:
          type: string
        captured_at:
          type: string
          format: date-time
        severity:
          type: string
          enum: [critical, high, medium, low]
        category:
          type: string
        title:
          type: string
        description:
          type: string
        edge_kind:
          type: string
        source_id:
          type: string
        source_name:
          type: string
        source_kind:
          type: string
        target_id:
          type: string
        target_name:
          type: string
        target_kind:
          type: string
        confidence:
          type: number
        variant:
          type: string
          enum:
            - unknown
            - default
            - credential_chain_observed_material
            - credential_chain_reference
            - credential_node_reference
            - cross_protocol_host_correlation
        evidence:
          $ref: "#/components/schemas/FindingEvidence"
        owasp_map:
          type: array
          items:
            type: string
        atlas_map:
          type: array
          items:
            type: string
        triage:
          allOf:
            - $ref: "#/components/schemas/TriageState"
          nullable: true
          description: >-
            Inline triage state for this finding (omitted when no decision
            has been recorded). Lets the register render the triage control
            without a per-row round-trip.

    FindingEvidence:
      type: object
      required: [state]
      properties:
        state:
          type: string
          enum: [unknown, observed_signal, inferred, hypothesis, reference_only]
        detector:
          type: string
        match_type:
          type: string
        channels:
          type: array
          items:
            type: string
        material_status:
          type: string
        exposure_status:
          type: string
        correlation:
          type: string

    TriageState:
      type: object
      properties:
        status:
          type: string
          enum: [new, triaging, confirmed, accepted-risk, false-positive]
        note:
          type: string
        updated_at:
          type: string
          format: date-time

    TriageUpdateRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [new, triaging, confirmed, accepted-risk, false-positive]
        note:
          type: string

    FindingDetail:
      type: object
      required: [finding, attack_path, remediation, impact]
      properties:
        finding:
          $ref: "#/components/schemas/Finding"
        composite_props:
          type: object
          additionalProperties: true
        attack_path:
          allOf:
            - $ref: "#/components/schemas/AttackPath"
          nullable: true
        remediation:
          type: array
          items:
            $ref: "#/components/schemas/RemediationStep"
        impact:
          allOf:
            - $ref: "#/components/schemas/FindingImpact"
          nullable: true
        snapshot:
          type: object
          properties:
            scope:
              type: string
            scan_id:
              type: string
            projection_status:
              type: string
            stale:
              type: boolean
            live_evidence_state:
              type: string
              enum:
                - unavailable
                - withheld_stale_projection
                - lookup_failed
                - classification_mismatch
                - matching_finding_no_graph
                - matching_published_projection

    AttackPath:
      type: object
      required:
        - nodes
        - edges
        - shape
        - continuity
        - direction
        - completeness
        - cost
        - total_risk_weight
      properties:
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/AttackPathNode"
        edges:
          type: array
          items:
            $ref: "#/components/schemas/AttackPathEdge"
        shape:
          type: string
          enum: [linear, branched, disconnected, cyclic, nodes_only]
        continuity:
          $ref: "#/components/schemas/EvidenceContinuity"
        direction:
          type: string
          enum: [forward, reverse, mixed, non_linear, not_applicable]
        completeness:
          $ref: "#/components/schemas/EvidenceCompleteness"
        linearization:
          $ref: "#/components/schemas/EvidenceLinearization"
        cost:
          $ref: "#/components/schemas/AttackCost"
        total_risk_weight:
          type: number
          nullable: true

    AttackPathNode:
      type: object
      required: [id, kinds, properties]
      properties:
        id:
          type: string
        kinds:
          type: array
          items:
            type: string
        properties:
          type: object
          additionalProperties: true

    AttackPathEdge:
      type: object
      required: [source, target, kind, properties, synthetic]
      properties:
        source:
          type: string
        target:
          type: string
        kind:
          type: string
        properties:
          type: object
          additionalProperties: true
        synthetic:
          type: boolean
        provenance:
          $ref: "#/components/schemas/EdgeProvenance"

    EdgeProvenance:
      type: object
      required: [type]
      properties:
        type:
          type: string
        basis:
          type: string
        source_collector:
          type: string

    EvidenceContinuity:
      type: object
      required: [state, component_count, missing_node_ids]
      properties:
        state:
          type: string
          enum: [continuous, discontinuous, not_applicable]
        component_count:
          type: integer
        missing_node_ids:
          type: array
          items:
            type: string

    EvidenceCompleteness:
      type: object
      required: [state, reasons]
      properties:
        state:
          type: string
          enum: [complete, incomplete, not_applicable]
        reasons:
          type: array
          items:
            type: string

    EvidenceLinearization:
      type: object
      required: [node_ids, edge_indexes]
      properties:
        node_ids:
          type: array
          items:
            type: string
        edge_indexes:
          type: array
          items:
            type: integer

    AttackCost:
      type: object
      required: [state, value, reasons, missing_weight_edge_indexes]
      properties:
        state:
          type: string
          enum: [complete, incomplete, not_applicable]
        value:
          type: number
          nullable: true
        reasons:
          type: array
          items:
            type: string
        missing_weight_edge_indexes:
          type: array
          items:
            type: integer

    RemediationActor:
      type: object
      required: [id, name, kind]
      properties:
        id:
          type: string
        name:
          type: string
        kind:
          type: string

    RemediationStep:
      type: object
      required: [step, title, description, edge_kind, source, target]
      properties:
        step:
          type: integer
        title:
          type: string
        description:
          type: string
        edge_kind:
          type: string
        source:
          $ref: "#/components/schemas/RemediationActor"
        target:
          $ref: "#/components/schemas/RemediationActor"
        channels:
          type: array
          items:
            type: string
        commands:
          type: array
          items:
            type: string

    FindingImpact:
      type: object
      required: [summary, blast_radius]
      properties:
        summary:
          type: string
        blast_radius:
          type: string
        data_sensitivity:
          type: string

    PreBuiltQuery:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        category:
          type: string
        severity:
          type: string
        owasp_map:
          type: array
          items:
            type: string
        atlas_map:
          type: array
          items:
            type: string

    PreBuiltResult:
      type: object
      properties:
        query:
          $ref: "#/components/schemas/PreBuiltQuery"
        rows:
          type: array
          items:
            type: object
            additionalProperties: true

    Rule:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        version:
          type: integer
        enabled:
          type: boolean
        severity:
          type: string
        scope:
          type: object
          properties:
            collector:
              type: string
            targets:
              type: array
              items:
                type: string
        owasp:
          type: array
          items:
            type: string
        tags:
          type: array
          items:
            type: string
        source:
          type: string

    NormalizationWarning:
      type: object
      required: [code, status, message, publication_unsafe]
      properties:
        code:
          type: string
        status:
          type: string
          enum: [warning, degraded]
        message:
          type: string
        context:
          type: string
        property:
          type: string
        publication_unsafe:
          type: boolean

    IngestResult:
      type: object
      properties:
        scan_id:
          type: string
        outcome:
          type: string
          enum: [unknown, complete, partial, failed]
        projection_status:
          type: string
        nodes_written:
          type: integer
        edges_written:
          type: integer
        nodes_submitted:
          type: integer
        edges_submitted:
          type: integer
        count_semantics:
          type: string
          enum: [neo4j_write_rows_v1]
        warnings:
          type: array
          items:
            type: string
        normalization_status:
          type: string
          enum: [complete, warning, degraded]
        normalization_warnings:
          type: array
          items:
            $ref: "#/components/schemas/NormalizationWarning"
        post_processing_stats:
          type: array
          items:
            type: object
            properties:
              processor_name:
                type: string
        stages:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              state:
                type: string
              required:
                type: boolean
              duration:
                type: integer
              error:
                type: string
        graph_before:
          type: object
          additionalProperties: true
        graph_after:
          type: object
          additionalProperties: true
        published_revision:
          type: integer
          format: int64
        duration:
          type: integer
          description: Duration in nanoseconds

    Scan:
      type: object
      properties:
        id:
          type: string
        collector:
          type: string
        status:
          type: string
          enum: [pending, running, completed, completed_with_errors, failed]
        started_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
        artifact_observed_at:
          type: string
          format: date-time
        node_count:
          type: integer
          description: Deprecated Neo4j node write-row count; not unique discoveries.
        edge_count:
          type: integer
          description: Deprecated Neo4j relationship write-row count; not unique discoveries.
        error:
          type: string
        collection_status:
          type: string
        graph_status:
          type: string
        analysis_status:
          type: string
        snapshot_status:
          type: string
        projection_status:
          type: string
        publication_status:
          type: string
        comparison_key:
          type: string
        graph_total_nodes_before:
          type: integer
          format: int64
        graph_total_edges_before:
          type: integer
          format: int64
        graph_total_nodes_after:
          type: integer
          format: int64
        graph_total_edges_after:
          type: integer
          format: int64
        comparable_to_scan_id:
          type: string
        published_revision:
          type: integer
          format: int64
        published_at:
          type: string
          format: date-time
        metadata:
          type: object
          additionalProperties: true

    ProjectionState:
      type: object
      properties:
        status:
          type: string
          enum: [unknown, updating, incomplete, complete]
        scan_id:
          type: string
        error:
          type: string
        dirty_coverage:
          type: array
          items:
            type: string
        updated_at:
          type: string
          format: date-time
        published_scan_id:
          type: string
        published_revision:
          type: integer
          format: int64
        published_at:
          type: string
          format: date-time

    PostureExport:
      type: object
      description: Immutable persisted export of one published posture revision.
      properties:
        schema_version:
          type: integer
        scope:
          type: object
          additionalProperties: true
        completeness:
          type: object
          additionalProperties: true
        observations:
          type: object
          additionalProperties: true
        health:
          type: object
          required: [state, captured]
          properties:
            state:
              type: string
              enum: [not_captured, ok, degraded]
            captured:
              type: boolean
            observed_at:
              type: string
              format: date-time
        limits:
          type: object
          properties:
            findings:
              type: object
              required: [returned, total, complete]
              properties:
                returned:
                  type: integer
                total:
                  type: integer
                complete:
                  type: boolean
        suppression:
          type: object
          additionalProperties: true
        graph_before:
          type: object
          additionalProperties: true
        graph_after:
          type: object
          additionalProperties: true
        comparison:
          type: object
          additionalProperties: true
        findings:
          type: array
          items:
            $ref: "#/components/schemas/Finding"

    CreateScanRequest:
      type: object
      required: [collector]
      properties:
        collector:
          type: string
          enum: [mcp, a2a, config]
        metadata:
          type: object
          additionalProperties: true

    QueryRequest:
      type: object
      required: [cypher]
      properties:
        cypher:
          type: string
        params:
          type: object
          additionalProperties: true

    QueryResponse:
      type: object
      properties:
        rows:
          type: array
          items:
            type: object
            additionalProperties: true

  responses:
    ValidationError:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Origin not in allowlist
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

paths:
  /health:
    get:
      summary: Health check
      description: Returns Neo4j and PostgreSQL connectivity status.
      operationId: getHealth
      tags: [Public]
      responses:
        "200":
          description: All services healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "503":
          description: One or more services unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /docs:
    get:
      summary: OpenAPI specification
      description: Returns this OpenAPI 3.0.3 specification as YAML.
      operationId: getDocs
      tags: [Public]
      responses:
        "200":
          description: OpenAPI spec
          content:
            application/yaml:
              schema:
                type: string

  /graph/stats:
    get:
      summary: Graph statistics
      description: Returns node and edge counts grouped by kind.
      operationId: getGraphStats
      tags: [Graph]
      responses:
        "200":
          description: Stats retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GraphStats"

  /graph/search:
    get:
      summary: Search graph nodes
      description: Free-text search over node properties.
      operationId: searchGraph
      tags: [Graph]
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
            minimum: 1
            maximum: 10000
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SearchResultItem"

  /graph/nodes:
    get:
      summary: List nodes
      description: List graph nodes with optional kind filter.
      operationId: listNodes
      tags: [Graph]
      parameters:
        - name: kind
          in: query
          schema:
            type: string
          description: Filter by node label (e.g. MCPServer, MCPTool)
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
            minimum: 1
            maximum: 10000
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: revision
          in: query
          schema:
            type: string
          description: Opaque X-Revision value from the first page.
      responses:
        "200":
          description: Nodes list
          headers:
            X-Total-Count:
              schema: { type: integer }
            X-Has-More:
              schema: { type: boolean }
            X-Offset:
              schema: { type: integer }
            X-Collection-Complete:
              schema: { type: boolean }
            X-Revision:
              schema: { type: string }
            X-Truncated:
              schema: { type: boolean }
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Node"
        "409":
          description: Graph revision changed; restart pagination at offset 0.

  /graph/nodes/{id}:
    get:
      summary: Get node
      description: Returns a single node with all connected edges.
      operationId: getNode
      tags: [Graph]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Node with edges
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NodeDetail"
        "404":
          $ref: "#/components/responses/NotFound"

  /graph/nodes/{id}/neighborhood:
    get:
      summary: Node neighborhood
      description: Returns the immediate (or N-hop) neighborhood of a node.
      operationId: getNodeNeighborhood
      tags: [Graph]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: depth
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1
            maximum: 3
        - name: limit
          in: query
          schema:
            type: integer
            default: 200
      responses:
        "200":
          description: Neighborhood subgraph
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NeighborhoodResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /graph/nodes/{id}/blast-radius:
    get:
      summary: Node blast radius
      description: >-
        Returns nodes reachable from (or to) the given node up to
        `max_hops`, grouped by ring distance.
      operationId: getNodeBlastRadius
      tags: [Graph]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: direction
          in: query
          schema:
            type: string
            enum: [out, in, both]
            default: out
        - name: max_hops
          in: query
          schema:
            type: integer
            default: 3
            minimum: 1
            maximum: 10
      responses:
        "200":
          description: Blast radius subgraph
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlastRadiusResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /graph/edges:
    get:
      summary: List edges
      description: List graph edges with optional filters.
      operationId: listEdges
      tags: [Graph]
      parameters:
        - name: kind
          in: query
          schema:
            type: string
          description: Filter by edge kind (e.g. TRUSTS_SERVER, CAN_REACH)
        - name: source
          in: query
          schema:
            type: string
          description: Filter by source node ID
        - name: target
          in: query
          schema:
            type: string
          description: Filter by target node ID
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
            minimum: 1
            maximum: 100000
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: revision
          in: query
          schema:
            type: string
          description: Opaque X-Revision value from the first page.
      responses:
        "200":
          description: Edges list
          headers:
            X-Total-Count:
              schema: { type: integer }
            X-Has-More:
              schema: { type: boolean }
            X-Offset:
              schema: { type: integer }
            X-Collection-Complete:
              schema: { type: boolean }
            X-Revision:
              schema: { type: string }
            X-Truncated:
              schema: { type: boolean }
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Edge"
        "409":
          description: Graph revision changed; restart pagination at offset 0.

  /ingest:
    post:
      summary: Ingest collector output
      description: >-
        Upload collector JSON. Runs the full pipeline: validate, normalize,
        deduplicate, write to Neo4j, post-process composite edges.
        Max body 100 MB.
      operationId: ingest
      tags: [Ingest]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Collector JSON output (see graph model docs)
      responses:
        "200":
          description: Ingest successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestResult"
        "400":
          $ref: "#/components/responses/ValidationError"
        "403":
          $ref: "#/components/responses/Forbidden"

  /analysis/shortest-path:
    post:
      summary: Shortest path
      description: >-
        Find a hop-shortest bounded path. Omitted scope preserves legacy
        undirected topology behavior; scope=security follows the directed
        security relationship policy.
      operationId: shortestPath
      tags: [Analysis]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PathRequest"
      responses:
        "200":
          description: Paths found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PathResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "403":
          $ref: "#/components/responses/Forbidden"

  /analysis/all-paths:
    post:
      summary: All paths
      description: >-
        Enumerate paths between two nodes under the selected topology/security
        policy, bounded by max_hops, limit, and an expansion cap.
      operationId: allPaths
      tags: [Analysis]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PathRequest"
      responses:
        "200":
          description: Paths found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PathResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "403":
          $ref: "#/components/responses/Forbidden"

  /analysis/weighted-path:
    post:
      summary: Weighted (lowest-risk) path
      description: >-
        Find the bounded minimum-risk-weight path with one deployment-independent
        algorithm. Missing weights use the disclosed 0.5 compatibility default;
        invalid negative/non-finite weights fail the request.
      operationId: weightedPath
      tags: [Analysis]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PathRequest"
      responses:
        "200":
          description: Weighted path found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PathResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "403":
          $ref: "#/components/responses/Forbidden"

  /analysis/findings:
    get:
      summary: Security findings
      description: >-
        `scope=published` returns exactly one published scan snapshot.
        Omitted scope preserves the legacy historical union (the latest row
        per fingerprint across all scans). Each row includes inline triage.
      operationId: getFindings
      tags: [Analysis]
      parameters:
        - name: severity
          in: query
          schema:
            type: string
            enum: [critical, high, medium, low]
        - name: include_suppressed
          in: query
          description: When true, include accepted-risk / false-positive findings.
          schema:
            type: boolean
            default: false
        - name: scope
          in: query
          description: Exact published snapshot or legacy historical union.
          schema:
            type: string
            enum: [published, history]
            default: history
      responses:
        "200":
          description: Findings list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Finding"

  /findings/triage/{fingerprint}:
    get:
      summary: Get finding triage state
      description: >-
        Returns the cross-scan triage decision for a finding fingerprint.
        Open read. A fingerprint with no recorded decision returns the
        implicit `new` state.
      operationId: getTriage
      tags: [Analysis]
      parameters:
        - name: fingerprint
          in: path
          required: true
          schema:
            type: string
          description: 16-character hex finding fingerprint
      responses:
        "200":
          description: Triage state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TriageState"
        "400":
          $ref: "#/components/responses/ValidationError"
    put:
      summary: Set finding triage state
      description: >-
        Records (or updates) the triage decision for a finding fingerprint.
        Triage state has no foreign key to findings, so it survives scan
        deletion and re-detection.
      operationId: setTriage
      tags: [Analysis]
      parameters:
        - name: fingerprint
          in: path
          required: true
          schema:
            type: string
          description: 16-character hex finding fingerprint
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TriageUpdateRequest"
      responses:
        "200":
          description: Updated triage state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TriageState"
        "400":
          $ref: "#/components/responses/ValidationError"
        "403":
          $ref: "#/components/responses/Forbidden"

  /analysis/findings/{id}:
    get:
      summary: Finding detail
      description: >-
        Returns a typed evidence graph and context for a single finding.
        Published scope starts from the persisted row, withholds mutable graph
        evidence when the projection is stale, and never substitutes a
        different live variant or evidence classification.
      operationId: getFindingDetail
      tags: [Analysis]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: scope
          in: query
          schema:
            type: string
            enum: [published, history]
      responses:
        "200":
          description: Finding detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FindingDetail"
        "404":
          $ref: "#/components/responses/NotFound"

  /analysis/prebuilt:
    get:
      summary: List pre-built queries
      description: Returns metadata for all 19 pre-built security queries.
      operationId: listPreBuilt
      tags: [Analysis]
      responses:
        "200":
          description: Query list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PreBuiltQuery"

  /analysis/prebuilt/{id}:
    get:
      summary: Execute pre-built query
      description: Run a pre-built query by ID and return results.
      operationId: runPreBuilt
      tags: [Analysis]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Query results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreBuiltResult"
        "404":
          $ref: "#/components/responses/NotFound"

  /posture:
    get:
      summary: Projection and publication state
      description: >-
        Separates the mutable projection attempt from the latest persisted
        published posture revision.
      operationId: getPostureState
      tags: [Analysis]
      responses:
        "200":
          description: Current projection/publication state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectionState"

  /posture/export:
    get:
      summary: Export the published posture
      description: >-
        Returns one immutable export persisted at publication time. The server
        does not combine current graph, finding, or scan-history reads.
      operationId: exportPublishedPosture
      tags: [Analysis]
      responses:
        "200":
          description: Persisted published posture export
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostureExport"
        "404":
          $ref: "#/components/responses/NotFound"

  /scans:
    get:
      summary: List scans
      description: List scan history with pagination.
      operationId: listScans
      tags: [Scans]
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: revision
          in: query
          schema:
            type: string
          description: Opaque X-Revision value from the first page.
        - name: order
          in: query
          schema:
            type: string
            enum: [started, completed, published]
            default: started
          description: Stable start order, latest usable completion, or current/latest publication order.
      responses:
        "200":
          description: Scan list
          headers:
            X-Total-Count:
              schema: { type: integer }
            X-Has-More:
              schema: { type: boolean }
            X-Offset:
              schema: { type: integer }
            X-Collection-Complete:
              schema: { type: boolean }
            X-Revision:
              schema: { type: string }
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Scan"
        "409":
          description: Scan history revision changed; restart pagination at offset 0.
    post:
      summary: Create scan
      description: Register a new scan.
      operationId: createScan
      tags: [Scans]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateScanRequest"
      responses:
        "201":
          description: Scan created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Scan"
        "400":
          $ref: "#/components/responses/ValidationError"
        "403":
          $ref: "#/components/responses/Forbidden"

  /scans/{id}:
    get:
      summary: Get scan
      description: Get scan details by ID.
      operationId: getScan
      tags: [Scans]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Scan details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Scan"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      summary: Delete scan
      description: >-
        Delete only PostgreSQL scan history. Never mutates Neo4j. Pending,
        running, active coverage-head, and currently published scans are
        rejected.
      operationId: deleteScan
      tags: [Scans]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Scan deleted
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Scan is active, owns a coverage head, or is currently published.

  /rules:
    get:
      summary: List detection rules
      description: Returns metadata for every loaded detection rule (builtin and custom).
      operationId: listRules
      tags: [Rules]
      parameters:
        - name: collector
          in: query
          schema:
            type: string
            enum: [mcp, a2a, config, all]
        - name: severity
          in: query
          schema:
            type: string
            enum: [critical, high, medium, low, info]
        - name: tag
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Rule list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Rule"

  /rules/{id}:
    get:
      summary: Get rule
      description: Returns the full definition of a single detection rule.
      operationId: getRule
      tags: [Rules]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Rule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rule"
        "404":
          $ref: "#/components/responses/NotFound"

  /query:
    post:
      summary: Raw Cypher query
      description: >-
        Execute a raw Cypher query against Neo4j. Browser callers are
        gated by OriginGuard (Origin allowlist); CLI users bypass HTTP
        entirely via `agenthound-server query`.
      operationId: rawQuery
      tags: [Admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QueryRequest"
      responses:
        "200":
          description: Query results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueryResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "403":
          $ref: "#/components/responses/Forbidden"
