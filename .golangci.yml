version: "2"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - unused
    - misspell
  settings:
    errcheck:
      check-type-assertions: true
  exclusions:
    generated: lax
    rules:
      - text: "Error return value of `.*.Close` is not checked"
        linters:
          - errcheck
    paths:
      - testdata
      - vendor

formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    paths:
      - testdata
      - vendor
