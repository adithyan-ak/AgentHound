server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;

    # Serve the signed A2A well-known documents as JSON. AgentHound fetches
    # /.well-known/agent-card.json first (200 here), so it never falls back to
    # the legacy /.well-known/agent.json path.
    location /.well-known/ {
        default_type application/json;
        add_header Cache-Control "no-store";
        try_files $uri =404;
    }

    location = /healthz {
        default_type text/plain;
        return 200 "ok\n";
    }

    location / {
        return 404;
    }
}
