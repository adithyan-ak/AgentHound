server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;

    # A second base path is an intentionally protocol-valid legacy deployment:
    # the current location is absent and clients must use the standard fallback.
    location = /legacy/.well-known/agent-card.json {
        return 404;
    }

    location ~ ^/(legacy/)?\.well-known/ {
        default_type application/json;
        add_header Cache-Control "no-store";
        try_files $uri =404;
    }

    location = /healthz {
        default_type text/plain;
        return 200 "ok\n";
    }

    location / {
        return 404;
    }
}
