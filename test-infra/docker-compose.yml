# AgentHound collector compatibility topology.
#
# Every protocol surface below is a real upstream implementation. Images are
# immutable tag@digest references and authored services use their projects'
# official SDKs. See UPSTREAMS.md for source revisions and refresh policy.
name: agenthound-test

# A single YAML scalar feeds the real LiteLLM process, the enforcing MCP
# bearer gate, and the runtime-rendered client header. Keeping one anchor is a
# hard guarantee that the cross-service lane correlates the same material; the
# collector artifacts retain only its SHA-256 value_hash.
x-litellm-master-key: &litellm-master-key sk-local-agenthound-master-key-not-production
x-cross-service-proof: &cross-service-proof 4a8f2c1d9e3b7a0f5c6d8e2b1a4f7c3d
x-a2a-protected-api-key: &a2a-protected-api-key agenthound-a2a-api-key-not-production

networks:
  agenthound-test:
    name: agenthound-test
    driver: bridge
    ipam:
      config:
        - subnet: 10.20.30.0/24

volumes:
  ollama-models:
  qdrant-storage:
  litellm-postgres-data:
  huggingface-cache:
  analysis-postgres-data:
  analysis-neo4j-data:

services:
  gguf-verifier:
    profiles: ["tools"]
    build:
      context: ./services/gguf-verifier
    volumes:
      - ./fixtures:/fixtures:ro

  ollama:
    image: ollama/ollama:0.12.0@sha256:14def4e0b9ac8c91b3ec6f7fa7684c924ffe244541d5fd827d9b89035cc33310
    networks:
      agenthound-test:
        ipv4_address: 10.20.30.10
    volumes:
      - ollama-models:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 2g

  vllm:
    # The official CPU image is the upstream-supported way to run vLLM without
    # a GPU. The model revision is immutable and intentionally small.
    image: vllm/vllm-openai-cpu:latest@sha256:6b301f040db8152dfb8ff55e06fd348aa5d0d9a311f58118160c7058262c8628
    command:
      - HuggingFaceTB/SmolLM2-135M-Instruct
      - --revision
      - 12fd25f77366fa6b3b4b768ec3050bf629380bac
      - --served-model-name
      - agenthound-vllm-fixture
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --max-model-len
      - "256"
      - --enforce-eager
      # On the CPU backend this upstream flag controls the fraction of system
      # RAM reserved for model weights and KV cache (despite its GPU-oriented
      # name). Keep the real server within the disposable Docker VM budget.
      - --gpu-memory-utilization
      - "0.18"
    environment:
      HF_HUB_DISABLE_TELEMETRY: "1"
      VLLM_CPU_OMP_THREADS_BIND: "0-3"
    volumes:
      - huggingface-cache:/root/.cache/huggingface
    networks:
      agenthound-test:
        ipv4_address: 10.20.30.11
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/v1/models')\""]
      interval: 15s
      timeout: 10s
      retries: 60
      start_period: 180s
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 6g

  langserve:
    build:
      context: ./services/langserve
    networks:
      agenthound-test:
        ipv4_address: 10.20.30.12
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/docs')\""]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512m

  qdrant:
    image: qdrant/qdrant:v1.15.5@sha256:0fb8897412abc81d1c0430a899b9a81eb8328aa634e7242d1bc804c1fe8fe863
    networks:
      agenthound-test:
        ipv4_address: 10.20.30.13
    volumes:
      - qdrant-storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1g

  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.5.0@sha256:1ef270be615bdfeecb1b65e6c557a14cd2f1d811204fe9c8e34c3bb0408fe550
    command: ["mlflow", "server", "--host", "0.0.0.0", "--port", "5000", "--workers", "1", "--allowed-hosts", "*"]
    networks:
      agenthound-test:
        ipv4_address: 10.20.30.14
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 24
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2560m

  litellm-postgres:
    image: postgres:16.14-alpine3.24@sha256:57c72fd2a128e416c7fcc499958864df5301e940bca0a56f58fddf30ffc07777
    environment:
      POSTGRES_DB: litellm
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: litellm-local-password
    volumes:
      - litellm-postgres-data:/var/lib/postgresql/data
    networks:
      - agenthound-test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d litellm -U litellm"]
      interval: 2s
      timeout: 5s
      retries: 30
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256m

  litellm:
    image: ghcr.io/berriai/litellm-database:v1.92.0@sha256:64d3547e0b131bf4638342e52c12bc46d6f1d9b8498e4b731ff31be5ab316ea9
    command: ["--config", "/app/config.yaml", "--host", "0.0.0.0", "--port", "4000"]
    environment:
      DATABASE_URL: postgresql://litellm:litellm-local-password@litellm-postgres:5432/litellm
      LITELLM_MASTER_KEY: *litellm-master-key
      LITELLM_URL: http://localhost:4000
    volumes:
      - ./services/litellm/config.yaml:/app/config.yaml:ro
      - ./services/seed/litellm-seed.py:/seed/litellm-seed.py:ro
    depends_on:
      litellm-postgres:
        condition: service_healthy
    networks:
      agenthound-test:
        ipv4_address: 10.20.30.15
    healthcheck:
      test: ["CMD", "python3", "/seed/litellm-seed.py"]
      interval: 10s
      timeout: 30s
      retries: 24
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2g

  jupyter:
    image: quay.io/jupyter/base-notebook:2025-08-25@sha256:e9222d8476431543c605f1f203654ef8f89f573cb169c2065e6b1aff8bbfa5b9
    command: ["start-notebook.py", "--IdentityProvider.token=agenthound-jupyter-token"]
    networks:
      agenthound-test:
        ipv4_address: 10.20.30.16
    healthcheck:
      # /api is a real public discovery endpoint; protected content is checked
      # independently by verify-upstreams.sh with and without the token.
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8888/api')\""]
      interval: 10s
      timeout: 5s
      retries: 24
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1g

  openwebui:
    image: ghcr.io/open-webui/open-webui:v0.10.2@sha256:9fcea9c6e32ab60b0498f3986c6cdf651ddbe61db48d2213a3d28048ddd673d4
    environment:
      PORT: "3000"
      WEBUI_AUTH: "true"
      ENABLE_SIGNUP: "true"
      OLLAMA_BASE_URLS: http://ollama:11434
      OPENAI_API_BASE_URLS: http://litellm:4000/v1
      OPENAI_API_KEYS: sk-agenthound-openwebui-upstream-not-production
      RAG_EMBEDDING_ENGINE: ollama
      RAG_EMBEDDING_MODEL: qwen2:0.5b
      ENABLE_RAG_HYBRID_SEARCH: "false"
    depends_on:
      ollama:
        condition: service_healthy
      litellm:
        condition: service_healthy
    networks:
      agenthound-test:
        ipv4_address: 10.20.30.17
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 48
      start_period: 180s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2g

  openai-decoy:
    # A real OpenAI-compatible LiteLLM process on vLLM's conventional port.
    # It is a near-miss oracle: it must never be classified as vLLM merely
    # because /v1/models has an OpenAI-compatible response shape.
    image: ghcr.io/berriai/litellm-database:v1.92.0@sha256:64d3547e0b131bf4638342e52c12bc46d6f1d9b8498e4b731ff31be5ab316ea9
    command: ["--config", "/app/config.yaml", "--host", "0.0.0.0", "--port", "8000"]
    volumes:
      - ./services/litellm/config-decoy.yaml:/app/config.yaml:ro
    # Start this second full LiteLLM process only after the real CPU vLLM has
    # reserved its model memory. Both remain live concurrently for scanning.
    depends_on:
      vllm:
        condition: service_healthy
    networks:
      agenthound-test:
        ipv4_address: 10.20.30.18
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/v1/models')\""]
      interval: 10s
      timeout: 10s
      retries: 24
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1g

  mcp-streamable:
    build:
      context: ./services/mcp-everything
    command: ["streamableHttp"]
    environment:
      PORT: "3001"
    networks:
      agenthound-test:
        ipv4_address: 10.20.30.20
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3001/mcp',{method:'POST'}).then(()=>process.exit(0)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 20s

  # Enforcing reverse proxy for the credential-bearing URL privacy lane. A
  # complete MCP session proves the real HTTP client preserved both URL
  # userinfo (as Basic auth) and the exact query value; the proxy returns 401
  # before forwarding if either is absent or changed.
  mcp-credential-gate:
    build:
      context: ./services/mcp-everything
    entrypoint: ["node", "/opt/mcp-everything/credential-gate.mjs"]
    environment:
      LISTEN_PORT: "3002"
      UPSTREAM_URL: http://mcp-streamable:3001
      EXPECTED_BASIC_USER: agenthound-user
      EXPECTED_BASIC_PASSWORD: agenthound-userinfo-secret-sentinel-20260719
      EXPECTED_QUERY_VALUE: agenthound-query-secret-sentinel-20260719
    depends_on:
      mcp-streamable:
        condition: service_healthy
    networks:
      agenthound-test:
        ipv4_address: 10.20.30.25
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3002/healthz').then(r=>process.exit(r.status===200?0:1)).catch(()=>process.exit(1))\""]
      interval: 5s
      timeout: 5s
      retries: 18
      start_period: 10s

  # Independent enforcing proxy for the cross-service credential-chain lane.
  # The Authorization bearer is the exact master material used by the real
  # LiteLLM process. A second high-entropy header is also required so the same
  # real config exercises server attribution for high-entropy credentials.
  # Only an authenticated request is forwarded to the official MCP Everything
  # implementation; the proxy never logs either credential.
  mcp-cross-service-gate:
    build:
      context: ./services/mcp-everything
    entrypoint: ["node", "/opt/mcp-everything/bearer-gate.mjs"]
    environment:
      LISTEN_PORT: "3003"
      UPSTREAM_URL: http://mcp-streamable:3001
      EXPECTED_BEARER_TOKEN: *litellm-master-key
      EXPECTED_PROOF_HEADER: *cross-service-proof
    depends_on:
      mcp-streamable:
        condition: service_healthy
    networks:
      agenthound-test:
        ipv4_address: 10.20.30.26
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3003/healthz').then(r=>process.exit(r.status===200?0:1)).catch(()=>process.exit(1))\""]
      interval: 5s
      timeout: 5s
      retries: 18
      start_period: 10s

  a2a-static:
    build:
      context: ./services/a2a-static
    networks:
      agenthound-test:
        ipv4_address: 10.20.30.21
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/.well-known/agent-card.json || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 10s

  a2a-dynamic:
    build:
      context: ./services/a2a-dynamic
    environment:
      A2A_PROTECTED_API_KEY: *a2a-protected-api-key
    networks:
      agenthound-test:
        ipv4_address: 10.20.30.22
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; base='http://127.0.0.1:9000'; [urllib.request.urlopen(base+p) for p in ('/.well-known/agent-card.json','/legacy/.well-known/agent.json','/protected/.well-known/agent-card.json','/ambiguous/.well-known/agent-card.json','/probe-state')]\""]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s

  mcp-sse:
    build:
      context: ./services/mcp-everything
    command: ["sse"]
    environment:
      PORT: "3001"
    networks:
      agenthound-test:
        ipv4_address: 10.20.30.23
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3001/sse').then(r=>process.exit(r.status < 500 ? 0 : 1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 20s

  contextforge:
    image: ghcr.io/ibm/mcp-context-forge:v1.0.5@sha256:fda7f025a21dd7df75afde0576432e28d39880e1914301c93b323aaf4bfcfcf0
    environment:
      HOST: 0.0.0.0
      PORT: "4444"
      GUNICORN_WORKERS: "1"
      DATABASE_URL: sqlite:////tmp/contextforge.db
      JWT_SECRET_KEY: agenthound-contextforge-jwt-secret-32-bytes-minimum
      AUTH_ENCRYPTION_SECRET: agenthound-contextforge-encryption-secret-32-bytes
      AUTH_REQUIRED: "true"
      MCP_REQUIRE_AUTH: "true"
      MCPGATEWAY_UI_ENABLED: "false"
      MCPGATEWAY_ADMIN_API_ENABLED: "true"
      PLATFORM_ADMIN_EMAIL: admin@agenthound.invalid
      PLATFORM_ADMIN_PASSWORD: Harness-Admin-Password-2026!
      PLATFORM_ADMIN_FULL_NAME: AgentHound Harness Admin
      SECURE_COOKIES: "false"
      SSRF_ALLOW_PRIVATE_NETWORKS: "true"
      SSRF_DNS_FAIL_CLOSED: "false"
    networks:
      agenthound-test:
        ipv4_address: 10.20.30.24
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:4444/health')\""]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 45s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2g

  # Production analysis dependencies are started only after network scanning,
  # so they cannot pollute the collector's real-service inventory.
  analysis-postgres:
    profiles: ["analysis"]
    image: postgres:16.14-alpine3.24@sha256:57c72fd2a128e416c7fcc499958864df5301e940bca0a56f58fddf30ffc07777
    environment:
      POSTGRES_DB: agenthound
      POSTGRES_USER: agenthound
      POSTGRES_PASSWORD: agenthound-analysis-local
    volumes:
      - analysis-postgres-data:/var/lib/postgresql/data
    networks:
      - agenthound-test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d agenthound -U agenthound"]
      interval: 2s
      timeout: 5s
      retries: 30

  analysis-neo4j:
    profiles: ["analysis"]
    image: neo4j:4.4-community@sha256:b0efe93722d27bc050908810650939380d989b1936fc5dd02ad1d7bf1c87a13b
    environment:
      NEO4J_AUTH: neo4j/agenthound-analysis-local
    volumes:
      - analysis-neo4j-data:/data
    networks:
      - agenthound-test
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p agenthound-analysis-local 'RETURN 1' >/dev/null"]
      interval: 5s
      timeout: 10s
      retries: 36
      start_period: 30s

  workstation:
    build:
      context: ./services/workstation
    networks:
      agenthound-test:
        ipv4_address: 10.20.30.100
    volumes:
      - ./fixtures:/root/fixtures
    environment:
      AGENTHOUND_HOST_ID: agenthound-test-workstation
      AGENTHOUND_NETWORK_REALM_ID: agenthound-test-lab
      AGENTHOUND_STORAGE_PAIR_ID: 7bc1f56e-c890-4de5-9cc5-921797176fa6
      AGENTHOUND_NEO4J_URI: bolt://analysis-neo4j:7687
      AGENTHOUND_NEO4J_USER: neo4j
      AGENTHOUND_NEO4J_PASSWORD: agenthound-analysis-local
      AGENTHOUND_PG_URI: postgres://agenthound:agenthound-analysis-local@analysis-postgres:5432/agenthound?sslmode=disable
      AGENTHOUND_LITELLM_MASTER_KEY: *litellm-master-key
      AGENTHOUND_CROSS_SERVICE_PROOF: *cross-service-proof
    depends_on:
      ollama:
        condition: service_healthy
      vllm:
        condition: service_healthy
      langserve:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      mlflow:
        condition: service_healthy
      litellm:
        condition: service_healthy
      jupyter:
        condition: service_healthy
      openwebui:
        condition: service_healthy
      openai-decoy:
        condition: service_healthy
      mcp-streamable:
        condition: service_healthy
      mcp-credential-gate:
        condition: service_healthy
      mcp-cross-service-gate:
        condition: service_healthy
      mcp-sse:
        condition: service_healthy
      a2a-static:
        condition: service_healthy
      a2a-dynamic:
        condition: service_healthy
      contextforge:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "command -v agenthound >/dev/null 2>&1 && command -v mcp-server-everything >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1g
