id: capability-shell-access
name: Shell Access Capability
description: >
  Classifies tools with shell/command execution capability based on
  keywords in tool name, description, and input schema properties.
version: 1
enabled: true
scope:
  collector: mcp
  targets: [tool.combined]
severity: high
owasp: [MCP01]
tags: [capability, shell-access]
matcher:
  type: regex
  pattern: '(?is)(?:\b(?:run[_-]?shell[_-]?command|run[_-]?command|execute[_-]?command|exec[_-]?command)\b|\bsh\s+-c\b|\bshell[ _-]?command\b|\b(?:run|execute|exec|spawn|invoke)\b.{0,64}\b(?:shell|bash|terminal|command|subprocess|powershell)\b|\b(?:shell|bash|terminal|command|subprocess|powershell)\b.{0,64}\b(?:run|execute|exec|spawn|invoke)\b)'
emit:
  finding_type: capability_classification
  property_key: capability_surface
  property_value: shell_access
