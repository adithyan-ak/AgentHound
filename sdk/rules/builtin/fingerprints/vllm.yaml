# vLLM exposes a service-specific /version endpoint. Unlike /v1/models, this
# signal is not shared by every OpenAI-compatible gateway and does not depend
# on the operator's arbitrary --served-model-name alias.
id: vllm
name: vLLM inference server
description: 'Identifies vLLM by its service-specific GET /version response'
version: 3
service_kind: vllm
probes:
  - method: GET
    path: /version
    matchers:
      - type: http_status
        status_code: 200
      - type: json_path
        path: "$.version"
        regex: '^.+$'
    captures:
      version: "$.version"
emit:
  node_kinds:
    - VLLMInstance
    - AIService
  properties:
    service_kind: vllm
    auth_method: unknown
    version: "{capture:version}"
