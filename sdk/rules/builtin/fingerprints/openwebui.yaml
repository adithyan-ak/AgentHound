# Open WebUI fingerprint rule (v0.3, v3 shape).
#
# Open WebUI is the most-deployed self-hosted ChatGPT-style frontend. It speaks
# to a backend Ollama (or any OpenAI-compatible API) and stores chat history,
# RAG documents, and per-user prompts. Default port 3000, no auth required to
# hit /api/version or /api/config — auth gates the chat endpoints and the
# admin-only /ollama/config, /openai/config, /api/v1/retrieval/* surfaces.
#
# /api/version returns: {"version":"0.3.x"}.
#
# v3 change: the historic $.ollama.base_url capture on /api/config was
# verified absent from Open WebUI's get_app_config response on every
# tag from v0.1.111 through v0.9.6 (and main). The old capture was dead
# and never emitted an EXPOSES edge in practice. It has been removed;
# the backend URL is now captured by the openwebuiloot Looter via the
# admin-gated /ollama/config endpoint (which does return OLLAMA_BASE_URLS).
#
# The second probe is a public shape guard: /api/config is expected to return
# {"name": "Open WebUI", ...} on every version. These public endpoints prove
# service identity, not anonymous access to chat or admin surfaces.
id: openwebui
name: Open WebUI chat frontend
description: 'Identifies Open WebUI from its version and application-config response shapes'
version: 4
service_kind: openwebui
probes:
  - method: GET
    path: /api/version
    matchers:
      - type: http_status
        status_code: 200
      - type: json_path
        path: "$.version"
        regex: '^\d+\.\d+\.\d+'
    captures:
      version: "$.version"
  # Second probe — read /api/config and confirm the response body is
  # shaped like Open WebUI's get_app_config output. Verified across
  # 14 tags + main: {"name": "Open WebUI", ...} is always present. This
  # strengthens the primary fingerprint without capturing any field
  # that changed across versions. Both probes are required because Ollama also
  # exposes the generic {"version":"X.Y.Z"} shape at /api/version.
  - method: GET
    path: /api/config
    matchers:
      - type: http_status
        status_code: 200
      - type: json_path
        path: "$.name"
        regex: '^Open WebUI$'
emit:
  node_kinds:
    - OpenWebUIInstance
    - AIService
  properties:
    service_kind: openwebui
    version: "{capture:version}"
