id: injection-base64-payload
name: Base64 Encoded Payload
description: >
  Detects long base64-encoded strings (20+ chars) embedded in descriptions,
  which may contain hidden instructions or payloads.
version: 1
enabled: true
scope:
  collector: all
  targets:
    - tool.description
    - skill.description
    - server.instructions
    - instruction.content
severity: high
owasp: [MCP04, ASI03]
tags: [injection, prompt-injection]
# Raw-only: this is a bare charset-run detector, and the canonical instruction
# shadow (NFKC folding, letter-spacing collapse) can synthesize long
# alphanumeric runs from benign text that would false-positive here.
shadow_exclude: true
matcher:
  type: regex
  pattern: '[A-Za-z0-9+/]{20,}={0,2}'
emit:
  finding_type: has_injection_patterns
  labels: [base64_instruction]
