tests:
  - input: "run_code Executes arbitrary Python code"
    should_match: true
    description: "matches run_code, execute, and python keywords"
  - input: "eval Evaluates a JavaScript expression"
    should_match: true
    description: "matches eval and javascript keywords"
  - input: "Reads a CSV file and returns rows"
    should_match: false
    description: "no code execution keywords present"
  - input: "list_scripts List available Python scripts in the workspace to run later"
    should_match: false
    description: "script inventory is not execution"
  - input: "pipeline_status Show whether the Python data pipeline is ready to execute"
    should_match: false
    description: "pipeline readiness is not execution"
  - input: "run_python Execute Python code supplied by the caller"
    should_match: true
    description: "direct Python execution remains classified"
  - input: "compile_source Compile source code supplied by the caller"
    should_match: true
    description: "direct source compilation remains classified"
